version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Entra a la ruta correcta e instala los paquetes
        - cd Frontend/frontend && npm install
    build:
      commands:
        # Compila el proyecto de React
        - cd Frontend/frontend && npm run build
  artifacts:
    # Indica dónde quedó la carpeta build final
    baseDirectory: Frontend/frontend/build
    files:
      - '**/*'
  cache:
    paths:
      - Frontend/frontend/node_modules/**/*