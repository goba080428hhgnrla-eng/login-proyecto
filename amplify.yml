version: 1
frontend:
  # 🚀 ESTO LE DICE A AWS QUE TODO EL FRONTEND CORRE DESDE ESTA CARPETA DESDE EL INICIO
  appRoot: Frontend/frontend
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - CI=false npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*